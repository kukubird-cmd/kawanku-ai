<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counselor Login - KawanKu AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #fdf6e2;
            --text-color: #4a3728;
            --accent-purple: #8b5cf6;
            --accent-mint: #a7f3d0;
            --accent-blue: #bae6fd;
            --border-color: #4a3728;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle, #fdf6e2 40%, #e0f2fe 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 8px 8px 0px 0px var(--border-color);
            position: relative;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 3rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(-3deg); }
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            margin-top: 10px;
            color: var(--text-color);
            text-shadow: 2px 2px 0px var(--accent-blue);
        }

        .badge {
            display: inline-block;
            background: var(--accent-mint);
            border: 2px solid var(--border-color);
            font-family: 'Fredoka', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 10px;
            box-shadow: 2px 2px 0px 0px var(--border-color);
        }

        p.subtitle {
            font-size: 0.95rem;
            color: #7a6655;
            margin-top: 12px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-color);
            background: #faf6ef;
            border: 3px solid var(--border-color);
            border-radius: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            background: #ffffff;
            box-shadow: 4px 4px 0px 0px var(--border-color);
            transform: translate(-2px, -2px);
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            border: 3px solid var(--border-color);
            border-radius: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            margin-top: 10px;
            background: var(--accent-blue);
            box-shadow: 4px 4px 0px 0px var(--border-color);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--border-color);
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px var(--border-color);
        }

        .alert {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #b91c1c;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .test-credentials {
            margin-top: 25px;
            padding: 12px;
            background: #f1ebd9;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #635345;
            border: 2px dashed var(--border-color);
        }

        .test-credentials code {
            font-weight: bold;
            color: var(--accent-purple);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 246, 226, 0.8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 5px solid #faf6ef;
            border-top: 5px solid var(--accent-purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>

            <div class="logo-section">
                <span class="logo-icon">🩺📋</span>
                <h1>Counselor Portal</h1>
                <div class="badge">Professional Access</div>
                <p class="subtitle">Securely assess student wellness & manage referrals</p>
            </div>

            <div class="alert" id="alertBox">Error message here</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="counselorId">Counselor ID</label>
                    <input type="text" id="counselorId" placeholder="e.g., COUN001" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Enter Advisor Dashboard 🔍</button>
            </form>

            <div class="test-credentials">
                🩺 <strong>Default Test:</strong> Use ID <code>COUN001</code> and password <code>password123</code>.
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // Pre-populate mock accounts in local storage
        if (!localStorage.getItem('kawanku_local_counselors')) {
            localStorage.setItem('kawanku_local_counselors', JSON.stringify([
                { counselor_id: 'COUN001', password: 'password123', full_name: 'Advisor Henderson' }
            ]));
        }

        function showAlert(msg) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.style.display = 'block';
        }

        function showLoading(show) {
            const loader = document.getElementById('loadingOverlay');
            if (show) {
                loader.classList.add('active');
            } else {
                loader.classList.remove('active');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const counselorId = document.getElementById('counselorId').value.trim();
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');
            alertBox.style.display = 'none';

            showLoading(true);

            // Attempt backend API call first
            try {
                const response = await fetch(`${API_BASE}/auth/counselor/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ counselor_id: counselorId, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('kawanku_counselor_session', JSON.stringify({
                        counselor_id: data.counselor_id,
                        full_name: data.full_name,
                        token: data.token
                    }));
                    window.location.href = 'index.html';
                    return;
                }
            } catch (error) {
                console.warn("Backend connection failed, falling back to offline localStorage login:", error);
            }

            // Offline localstorage fallback
            setTimeout(() => {
                showLoading(false);
                const localCounselors = JSON.parse(localStorage.getItem('kawanku_local_counselors') || '[]');
                const counselor = localCounselors.find(c => c.counselor_id === counselorId);

                if (counselor && counselor.password === password) {
                    localStorage.setItem('kawanku_counselor_session', JSON.stringify({
                        counselor_id: counselor.counselor_id,
                        full_name: counselor.full_name,
                        token: 'mock-offline-token'
                    }));
                    window.location.href = 'index.html';
                } else {
                    showAlert('Invalid counselor ID or password. Please try again.');
                }
            }, 500);
        }
    </script>
</body>
</html>
