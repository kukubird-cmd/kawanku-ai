                                        <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 rounded-full bg-emerald-100 border border-emerald-200 flex items-center justify-center text-[10px]">🌿</span> Balanced</span>
                                        <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 rounded-full bg-sky-100 border border-sky-200 flex items-center justify-center text-[10px]">☁️</span> Overwhelmed</span>
                                        <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 rounded-full bg-purple-100 border border-purple-200 flex items-center justify-center text-[10px]">💜</span> Low Energy</span>
                                        <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 rounded-full border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400">_</span> Unlogged</span>
                                    </div>
                                </div>

                                {/* Right Side: Gentle Reflection Panel */}
                                <div className="lg:col-span-5 flex flex-col justify-between bg-white/50 backdrop-blur-md rounded-3xl p-6 border border-white/40 shadow-inner">
                                    {selectedDayData ? (
                                        <div className="flex flex-col gap-5 h-full justify-between">
                                            {/* Validation Header */}
                                            <div>
                                                <div className="flex items-start justify-between">
                                                    <div>
                                                        <p className="text-xs text-indigo-700/80 font-bold uppercase tracking-wider">Your Day's Vibe</p>
                                                        <h2 className="text-xl font-bold text-[#4A3E3D]">Oct {selectedDayNum}, 2026</h2>
                                                    </div>
                                                    <span className="text-3xl filter drop-shadow-sm">{selectedDayData.icon}</span>
                                                </div>
                                                
                                                <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold border mt-2 ${selectedDayData.color}`}>
                                                    {selectedDayData.title}
                                                </span>
                                            </div>

                                            {/* Notes / Reflection Text */}
                                            <div className="bg-white/70 p-4 rounded-2xl border border-white/20 shadow-sm text-sm text-[#4A3E3D] italic leading-relaxed">
                                                "{selectedDayData.notes}"
                                            </div>

                                            {/* Self-Compassion Tags */}
                                            <div>
                                                <h4 className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Pills of Awareness</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedDayData.tags.map((tag, idx) => (
                                                        <span key={idx} className="bg-[#FAF8F5]/80 text-[#4A3E3D] border border-gray-200/80 text-xs px-3 py-1.5 rounded-full font-medium shadow-sm flex items-center gap-1">
                                                            {tag}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Multimodal Verification & Final Reports */}
                                            <div>
                                                <h4 className="text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Verified Mood Sources (Click for Final Report)</h4>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <button 
                                                        onClick={() => selectedDayData.chat && setActiveReport({ type: 'chat', data: selectedDayData.chat, date: `Oct ${selectedDayNum}, 2026` })}
                                                        className={`p-2 rounded-xl border text-center transition-all w-full select-none ${selectedDayData.chat ? 'bg-emerald-50/50 border-emerald-200 text-emerald-800 hover:scale-[1.03] active:scale-95 cursor-pointer shadow-sm shadow-emerald-50' : 'bg-gray-50/30 border-gray-200 text-gray-400 cursor-not-allowed'}`}
                                                    >
                                                        <span className="text-base block mb-0.5">💬</span>
                                                        <span className="text-[10px] font-bold block">Chat Log</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => selectedDayData.face && setActiveReport({ type: 'face', data: selectedDayData.face, date: `Oct ${selectedDayNum}, 2026` })}
                                                        className={`p-2 rounded-xl border text-center transition-all w-full select-none ${selectedDayData.face ? 'bg-emerald-50/50 border-emerald-200 text-emerald-800 hover:scale-[1.03] active:scale-95 cursor-pointer shadow-sm shadow-emerald-50' : 'bg-gray-50/30 border-gray-200 text-gray-400 cursor-not-allowed'}`}
                                                    >
                                                        <span className="text-base block mb-0.5">📷</span>
                                                        <span className="text-[10px] font-bold block">Facial Cues</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => selectedDayData.quiz && setActiveReport({ type: 'quiz', data: selectedDayData.quiz, date: `Oct ${selectedDayNum}, 2026` })}
                                                        className={`p-2 rounded-xl border text-center transition-all w-full select-none ${selectedDayData.quiz ? 'bg-emerald-50/50 border-emerald-200 text-emerald-800 hover:scale-[1.03] active:scale-95 cursor-pointer shadow-sm shadow-emerald-50' : 'bg-gray-50/30 border-gray-200 text-gray-400 cursor-not-allowed'}`}
                                                    >
                                                        <span className="text-base block mb-0.5">📊</span>
                                                        <span className="text-[10px] font-bold block">Quiz Score</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        /* Unlogged state */
                                        <div className="flex flex-col items-center justify-center text-center py-16 h-full">
                                            <span className="text-4xl opacity-50 mb-3">🕯️</span>
                                            <h3 className="text-base font-bold text-gray-600">Unlogged Day</h3>
                                            <p className="text-xs text-gray-500 max-w-xs mt-2 leading-relaxed">
                                                There is no log for this day. Self-care doesn't require perfection. Rest is always enough.
                                            </p>
                                        </div>
                                    )}

                                    {/* Privacy Assurance Anchor */}
                                    <div className="mt-6 pt-4 border-t border-white/20 flex items-center justify-center gap-1.5 text-[10px] text-gray-500/80 font-bold tracking-wide">
                                        <svg className="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                                        <span>Your private diary. Encrypted & completely safe with KawanKu.</span>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* Safe Space Mode (Zen View) */
                            <div className="flex flex-col items-center justify-center text-center py-12 px-4 transition-all duration-700 ease-in-out">
                                <span className="text-5xl filter drop-shadow-md mb-6 animate-pulse-slow">🕊️</span>
                                
                                {/* pulsating breathing circle */}
                                <div className="w-56 h-56 rounded-full flex flex-col items-center justify-center relative shadow-inner border border-white/30 mb-8 select-none">
                                    <div className="breathing-circle w-40 h-40 rounded-full flex flex-col items-center justify-center relative border border-sky-300/40">
                                        <span className="text-xl font-bold text-sky-800 tracking-wide transition-all duration-500">
                                            {breathingTexts[breathingStep].text}
                                        </span>
                                    </div>
                                    <span className="text-[10px] uppercase font-bold text-sky-700/70 tracking-wider absolute bottom-6">
                                        {breathingTexts[breathingStep].instruction}
                                    </span>
                                </div>

                                <div className="max-w-xl bg-white/40 p-6 rounded-3xl border border-white/20 shadow-sm">
                                    <p className="text-base text-[#4A3E3D] italic font-medium leading-relaxed">
                                        "{ZEN_QUOTES[quoteIndex]}"
                                    </p>
                                    <span className="text-[10px] uppercase font-bold tracking-wider text-indigo-700/60 block mt-3">KawanKu Zen Affirmations</span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Final Report Modal dialog Overlay */}
                    {activeReport && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="glass-card bg-white/95 rounded-3xl p-6 max-w-md w-full shadow-2xl border border-white/20 relative animate-fade-in">
                                {/* Close Button */}
                                <button 
                                    onClick={() => setActiveReport(null)}
                                    className="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-2xl font-semibold transition-all"
                                >
                                    &times;
                                </button>
                                
                                {activeReport.type === 'chat' && (
                                    <div>
                                        <div className="flex items-center gap-2 text-indigo-700 font-bold text-lg mb-4">
                                            <span>💬</span>
                                            <h3>Gentle Chat Log Report</h3>
                                        </div>
                                        <p className="text-xs text-gray-500 font-bold mb-3">{activeReport.date} • {activeReport.data.time}</p>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-sm text-gray-700 leading-relaxed mb-4">
                                            <span className="font-bold block text-xs text-slate-500 uppercase mb-1">Interactive Summary</span>
                                            "{activeReport.data.summary}"
                                        </div>
                                        <div className="bg-rose-50/70 p-4 rounded-2xl border border-rose-100 text-sm text-rose-800 leading-relaxed">
                                            <span className="font-bold block text-xs text-rose-500 uppercase mb-1">Therapeutic Comfort</span>
                                            "{activeReport.data.comfortMessage}"
                                        </div>
                                    </div>
                                )}

                                {activeReport.type === 'face' && (
                                    <div>
                                        <div className="flex items-center gap-2 text-sky-700 font-bold text-lg mb-4">
                                            <span>📷</span>
                                            <h3>Facial Expression Analysis</h3>
                                        </div>
                                        <p className="text-xs text-gray-500 font-bold mb-3">{activeReport.date} • {activeReport.data.time}</p>
                                        
                                        {/* Breakdown Bars */}
                                        <div className="space-y-3 mb-4">
                                            <span className="font-bold block text-xs text-slate-500 uppercase">Emotion Breakdown</span>
                                            {Object.entries(activeReport.data.breakdown).map(([emotion, val]) => (
                                                <div key={emotion}>
                                                    <div className="flex justify-between text-xs font-bold text-[#4A3E3D] mb-1">
                                                        <span>{emotion}</span>
                                                        <span>{val}</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                        <div 
                                                            className={`h-full rounded-full ${
                                                                emotion === 'Joy' ? 'bg-amber-400' : 
                                                                emotion === 'Neutral' ? 'bg-emerald-400' : 
                                                                emotion === 'Calm' ? 'bg-emerald-400' : 
                                                                emotion === 'Stress' ? 'bg-sky-400' : 'bg-purple-400'
                                                            }`} 
                                                            style={{ width: val }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="bg-sky-50 p-4 rounded-2xl border border-sky-100 text-sm text-sky-800 leading-relaxed">
                                            <span className="font-bold block text-xs text-sky-600 uppercase mb-1">Facial Muscle Cues</span>
                                            "{activeReport.data.notes}"
                                        </div>
                                    </div>
                                )}

                                {activeReport.type === 'quiz' && (
                                    <div>
                                        <div className="flex items-center gap-2 text-emerald-700 font-bold text-lg mb-4">
                                            <span>📊</span>
                                            <h3>Emotion Quiz Final Report</h3>
                                        </div>
                                        <p className="text-xs text-gray-500 font-bold mb-3">{activeReport.date} • {activeReport.data.time}</p>
                                        
                                        {/* Score badge */}
                                        <div className="flex items-center gap-3 bg-emerald-50 p-4 rounded-2xl border border-emerald-100 mb-4">
                                            <span className="text-3xl">🏆</span>
                                            <div>
                                                <span className="text-[10px] text-emerald-600 font-bold uppercase block">Score & Level</span>
                                                <span className="text-sm font-bold text-emerald-800">{activeReport.data.score} ({activeReport.data.result})</span>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-sm text-gray-700 leading-relaxed">
                                            <span className="font-bold block text-xs text-slate-500 uppercase mb-1.5">Assessment Summary</span>
                                            <p className="text-xs font-semibold leading-relaxed text-gray-600">
                                                {activeReport.data.summary}
                                            </p>
                                        </div>
                                    </div>
                                )}
                                
                                <button 
                                    onClick={() => setActiveReport(null)}
                                    className="w-full mt-6 bg-[#4A3E3D] hover:bg-[#3D3330] text-white text-sm font-bold py-3 rounded-2xl shadow-md transition-all active:scale-[0.98]"
                                >
                                    Close Report
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
